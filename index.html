<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NilAr Edu — Bilik Yarışması</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:linear-gradient(160deg,#0d1b3e 0%,#1a1060 35%,#0d3060 65%,#0a4a4a 100%);min-height:100vh;color:#fff;background-attachment:fixed}
header{background:linear-gradient(135deg,#08091e,#150d50,#082050);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 3px 24px rgba(0,0,0,0.5);border-bottom:1px solid rgba(240,192,96,0.2)}
.logo{font-size:1.3rem;font-weight:800;color:#f0c060}
.hdr-right{display:flex;gap:8px;align-items:center}
.xal{background:rgba(240,192,96,0.15);border:1px solid rgba(240,192,96,0.3);padding:7px 16px;border-radius:10px;font-weight:700;font-size:0.9rem;color:#f0c060;cursor:pointer}
.admin-btn{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);padding:7px 14px;border-radius:10px;font-size:0.78rem;color:rgba(255,255,255,0.55);cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600}

/* SCREENS */
.scr{display:none;padding:24px 20px;max-width:680px;margin:0 auto}
.scr.on{display:block}

/* HOME */
.hero{text-align:center;padding:30px 0 20px}
.hero h1{font-size:2rem;font-weight:900;line-height:1.2;margin-bottom:12px}
.hero h1 span{color:#f0c060}
.hero p{color:rgba(255,255,255,0.5);font-size:0.9rem;margin-bottom:24px}
.card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:24px}
.lbl{font-size:0.75rem;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:12px;margin-top:20px}
.lbl:first-child{margin-top:0}
input[type=text]{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:13px 16px;color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;outline:none}
input[type=text]:focus{border-color:#f0c060}
input[type=text]::placeholder{color:rgba(255,255,255,0.3)}
.sinif-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sbtn{background:rgba(255,255,255,0.08);border:2px solid transparent;border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer;transition:all 0.2s;color:#fff}
.sbtn:active,.sbtn.sel{background:rgba(240,192,96,0.2);border-color:#f0c060;color:#f0c060}
.sbtn .num{font-size:1.4rem;font-weight:900;display:block}
.sbtn .txt{font-size:0.65rem;opacity:0.6}
.fenn-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fbtn{background:rgba(255,255,255,0.08);border:2px solid transparent;border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.2s;color:#fff}
.fbtn:active,.fbtn.sel{background:rgba(240,192,96,0.2);border-color:#f0c060}
.fbtn .ico{font-size:1.5rem;display:block;margin-bottom:4px}
.fbtn .nm{font-size:0.72rem;font-weight:600;line-height:1.3}
.start{width:100%;padding:16px;background:linear-gradient(135deg,#c9993a,#f0c060);color:#0f1f3d;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;margin-top:20px;opacity:0.4}
.start:not([disabled]){opacity:1}

/* QUIZ */
.qbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qbadge{padding:5px 14px;border-radius:20px;font-size:0.75rem;font-weight:700}
.qnum{font-size:0.85rem;color:rgba(255,255,255,0.5)}
.prog{height:8px;background:rgba(255,255,255,0.1);border-radius:8px;margin-bottom:18px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c9993a,#f0c060);border-radius:8px;transition:width 0.4s}
.timer-wrap{display:flex;justify-content:center;margin-bottom:16px}
.timer-box{width:60px;height:60px;border-radius:50%;border:4px solid #f0c060;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:#f0c060}
.timer-box.red{border-color:#ff4444;color:#ff4444;animation:blink 0.5s infinite}
@keyframes blink{50%{opacity:0.3}}
.qcard{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:24px;margin-bottom:16px}
.qtag{display:inline-block;padding:4px 12px;border-radius:8px;font-size:0.72rem;font-weight:700;margin-bottom:12px}
.qico{font-size:2.2rem;display:block;margin-bottom:10px}
.qtxt{font-size:1.05rem;font-weight:700;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.obtn{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:13px 12px;color:#fff;font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all 0.2s}
.obtn:not([disabled]):hover{border-color:#f0c060}
.oltr{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:800;flex-shrink:0}
.obtn.correct{background:rgba(46,204,113,0.15);border-color:#2ecc71}
.obtn.correct .oltr{background:#2ecc71;color:#fff}
.obtn.wrong{background:rgba(255,68,68,0.15);border-color:#ff4444}
.obtn.wrong .oltr{background:#ff4444;color:#fff}
.obtn.reveal{background:rgba(240,192,96,0.1);border-color:#f0c060}
.fb{display:none;background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:0.85rem;line-height:1.5}
.fb.show{display:block}
.fb.ok{border-left:3px solid #2ecc71}
.fb.bad{border-left:3px solid #ff4444}
.fb.time{border-left:3px solid #f0c060}
.nxt{width:100%;padding:13px;background:#fff;color:#0f1f3d;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;margin-top:12px;display:none}
.nxt.show{display:block}

/* RESULT */
.res-hero{text-align:center;padding:20px 0 28px}
.res-emoji{font-size:64px;display:block;margin-bottom:12px}
.res-title{font-size:1.8rem;font-weight:900;margin-bottom:6px}
.res-sub{color:rgba(255,255,255,0.5);font-size:0.9rem}
.res-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:24px;margin-bottom:20px;text-align:center}
.res-big{font-size:3rem;font-weight:900;color:#f0c060}
.res-label{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:4px}
.res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:18px}
.rs{padding:14px;border-radius:12px;text-align:center}
.rs.g{background:rgba(46,204,113,0.1)}
.rs.r{background:rgba(255,68,68,0.1)}
.rs.b{background:rgba(240,192,96,0.1)}
.rs-v{font-size:1.4rem;font-weight:800;display:block;margin-bottom:2px}
.rs.g .rs-v{color:#2ecc71}
.rs.r .rs-v{color:#ff4444}
.rs.b .rs-v{color:#f0c060}
.rs-k{font-size:0.7rem;color:rgba(255,255,255,0.4)}
.cert-btn{width:100%;padding:15px;background:linear-gradient(135deg,#c9993a,#f0c060);color:#0f1f3d;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:12px;display:none}
.cert-btn.show{display:block}
.res-btns{display:flex;gap:10px}
.rbtn{flex:1;padding:13px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}
.rbtn.p{background:#fff;color:#0f1f3d}
.rbtn.s{background:rgba(255,255,255,0.1);color:#fff}

/* CERT MODAL */
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.mbox{background:#fff;border-radius:16px;width:100%;max-width:600px;overflow:hidden}
.mbox canvas{width:100%;display:block}
.mbtns{padding:14px 16px;display:flex;gap:10px;border-top:1px solid #eee}
.mbtn{flex:1;padding:12px;border-radius:10px;border:none;font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer}
.mbtn.dl{background:#c9993a;color:#fff}
.mbtn.cl{background:#f0f0f0;color:#333}

/* CONFETTI */
.cnf{position:fixed;pointer-events:none;z-index:999;animation:fall linear forwards}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

@media(max-width:400px){
  .sinif-grid{grid-template-columns:repeat(3,1fr)}
  .opts{grid-template-columns:1fr}
  .res-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">NilAr <span style="color:rgba(255,255,255,0.35);font-size:0.65rem;font-weight:400;letter-spacing:1px">EDU CENTER</span></div>
  <div class="hdr-right">
    <button class="admin-btn" onclick="openAdmin()">⚙ Admin</button>
    <div class="xal">⭐ <span id="xalTxt">0</span> xal</div>
  </div>
</header>

<!-- HOME -->
<div class="scr on" id="homeScr">
  <div class="hero">
    <h1>Biliyi sına,<br><span>sertifikat</span> qazan!</h1>
    <p>90%+ nəticə üçün fərdi sertifikat alacaqsan.</p>
  </div>
  <div class="card">
    <div class="lbl">Ad Soyad</div>
    <input type="text" id="adInp" placeholder="Adınızı yazın..." oninput="yoxla()">
    <div class="lbl">Sinif seçin</div>
    <div class="sinif-grid">
      <div class="sbtn" id="s2" onclick="sinifSec(2)"><span class="num">2</span><span class="txt">sinif</span></div>
      <div class="sbtn" id="s3" onclick="sinifSec(3)"><span class="num">3</span><span class="txt">sinif</span></div>
      <div class="sbtn" id="s4" onclick="sinifSec(4)"><span class="num">4</span><span class="txt">sinif</span></div>
      <div class="sbtn" id="s5" onclick="sinifSec(5)"><span class="num">5</span><span class="txt">sinif</span></div>
      <div class="sbtn" id="s6" onclick="sinifSec(6)"><span class="num">6</span><span class="txt">sinif</span></div>
    </div>
    <div class="lbl" id="fennLbl" style="display:none">Fənn seçin</div>
    <div class="fenn-grid" id="fennGrid" style="display:none"></div>
    <button class="start" id="startBtn" disabled onclick="baslat()">Yarışmanı Başlat →</button>
  </div>
</div>

<!-- QUIZ -->
<div class="scr" id="quizScr">
  <div class="qbar">
    <span class="qbadge" id="qBadge" style="background:#c9993a;color:#0f1f3d"></span>
    <span class="qnum" id="qNum">1 / 10</span>
  </div>
  <div class="prog"><div class="prog-fill" id="progFill" style="width:10%"></div></div>
  <div class="timer-wrap"><div class="timer-box" id="timerBox">40</div></div>
  <div class="qcard">
    <span class="qtag" id="qTagSpan" style="background:#c9993a;color:#0f1f3d"></span>
    <span class="qico" id="qIco">🔢</span>
    <div class="qtxt" id="qTxt">Yüklənir...</div>
  </div>
  <div class="opts" id="optsDiv"></div>
  <div class="fb" id="fbDiv"></div>
  <button class="nxt" id="nxtBtn" onclick="novbeti()">Növbəti →</button>
</div>

<!-- RESULT -->
<div class="scr" id="resScr">
  <div class="res-hero">
    <span class="res-emoji" id="resEmoji">🏆</span>
    <h2 class="res-title" id="resTitle">Əla!</h2>
    <p class="res-sub" id="resSub"></p>
  </div>
  <div class="res-card">
    <div class="res-big" id="resBig">0/10</div>
    <div class="res-label">düzgün cavab</div>
    <div class="res-stats">
      <div class="rs g"><span class="rs-v" id="rsC">0</span><span class="rs-k">✅ Düzgün</span></div>
      <div class="rs r"><span class="rs-v" id="rsW">0</span><span class="rs-k">❌ Yanlış</span></div>
      <div class="rs b"><span class="rs-v" id="rsX">0</span><span class="rs-k">⭐ Xal</span></div>
    </div>
  </div>
  <button class="cert-btn" id="certBtn" onclick="sertifikatGoster()">🏅 Sertifikatı Al</button>
  <div class="res-btns">
    <button class="rbtn p" onclick="baslat()">🔄 Yenidən</button>
    <button class="rbtn s" onclick="evScrGoster()">🏠 Ana səhifə</button>
  </div>
</div>

<!-- CERT MODAL -->
<div class="modal" id="certModal">
  <div class="mbox">
    <canvas id="certCvs"></canvas>
    <div class="mbtns">
      <button class="mbtn dl" onclick="sertYukle()">⬇ Yüklə</button>
      <button class="mbtn cl" onclick="document.getElementById('certModal').classList.remove('open')">Bağla</button>
    </div>
  </div>
</div>

// ══════════════════════════════
// STATE
// ══════════════════════════════
var secilmisSinif = 0;
var secilmisFenn = "";
var daxilEdilmisAd = "";
var suallar = [];
var cariIdx = 0;
var duzgun = 0;
var yanlis = 0;
var xal = 0;
var umumi = parseInt(localStorage.getItem("nilarXal") || "0");
var timer = null;
var qalan = 40;

document.getElementById("xalTxt").textContent = umumi;

// ══════════════════════════════
// HOME
// ══════════════════════════════
function sinifSec(n) {
  secilmisSinif = n;
  secilmisFenn = "";
  document.querySelectorAll(".sbtn").forEach(function(b) { b.classList.remove("sel"); });
  var el = document.getElementById("s" + n);
  if (el) el.classList.add("sel");
  
  var list = FCFG[n] || [];
  var grid = document.getElementById("fennGrid");
  grid.innerHTML = "";
  list.forEach(function(f) {
    var div = document.createElement("div");
    div.className = "fbtn";
    div.id = "f_" + f.k;
    div.innerHTML = '<span class="ico">' + f.ic + '</span><span class="nm">' + f.n + '</span>';
    div.onclick = function() { fennSec(f.k); };
    grid.appendChild(div);
  });
  
  document.getElementById("fennLbl").style.display = "block";
  document.getElementById("fennGrid").style.display = "grid";
  yoxla();
}

function fennSec(k) {
  secilmisFenn = k;
  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("sel"); });
  var el = document.getElementById("f_" + k);
  if (el) el.classList.add("sel");
  yoxla();
}

function yoxla() {
  daxilEdilmisAd = document.getElementById("adInp").value.trim();
  var btn = document.getElementById("startBtn");
  btn.disabled = !(daxilEdilmisAd.length >= 2 && secilmisSinif && secilmisFenn);
}

// ══════════════════════════════
// QUIZ
// ══════════════════════════════
function baslat() {
  daxilEdilmisAd = document.getElementById("adInp").value.trim();
  var pool = (SUALLAR[secilmisSinif] && SUALLAR[secilmisSinif][secilmisFenn]) ? 
              SUALLAR[secilmisSinif][secilmisFenn].slice() : [];
  
  // Karisdir
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  suallar = pool.slice(0, 10);
  cariIdx = 0; duzgun = 0; yanlis = 0; xal = 0;
  
  var fc = FCFG[secilmisSinif] && FCFG[secilmisSinif].filter(function(f){ return f.k === secilmisFenn; })[0];
  document.getElementById("qBadge").textContent = secilmisSinif + "-ci sinif · " + (fc ? fc.n : "");
  
  goster("quizScr");
  sualGoster();
}

function sualGoster() {
  var q = suallar[cariIdx];
  document.getElementById("qNum").textContent = (cariIdx + 1) + " / " + suallar.length;
  document.getElementById("progFill").style.width = ((cariIdx + 1) / suallar.length * 100) + "%";
  document.getElementById("qTagSpan").textContent = secilmisSinif + "-ci sinif";
  document.getElementById("qIco").textContent = q.e;
  document.getElementById("qTxt").textContent = q.q;
  
  var herfler = ["A","B","C","D"];
  var opts = document.getElementById("optsDiv");
  opts.innerHTML = "";
  q.o.forEach(function(opt, i) {
    var btn = document.createElement("button");
    btn.className = "obtn";
    btn.id = "op" + i;
    btn.innerHTML = '<span class="oltr">' + herfler[i] + '</span>' + opt;
    btn.onclick = (function(idx){ return function(){ cavabla(idx); }; })(i);
    opts.appendChild(btn);
  });
  
  document.getElementById("fbDiv").className = "fb";
  document.getElementById("fbDiv").textContent = "";
  document.getElementById("nxtBtn").className = "nxt";
  
  taymeriBaslat();
}

function taymeriBaslat() {
  clearInterval(timer);
  qalan = 40;
  taymeriYenile();
  timer = setInterval(function() {
    qalan--;
    taymeriYenile();
    if (qalan <= 0) { clearInterval(timer); vaxtBitdi(); }
  }, 1000);
}

function taymeriYenile() {
  var el = document.getElementById("timerBox");
  el.textContent = qalan;
  if (qalan <= 8) { el.className = "timer-box red"; }
  else { el.className = "timer-box"; }
}

function vaxtBitdi() {
  deaktiv();
  var q = suallar[cariIdx];
  document.getElementById("op" + q.a).classList.add("reveal");
  fbGoster("time", "⏰ Vaxt bitdi! Düzgün: " + q.o[q.a] + ". " + q.i);
  yanlis++;
  document.getElementById("nxtBtn").className = "nxt show";
}

function cavabla(idx) {
  clearInterval(timer);
  deaktiv();
  var q = suallar[cariIdx];
  if (idx === q.a) {
    document.getElementById("op" + idx).classList.add("correct");
    var bonus = Math.ceil(qalan / 4);
    var qazanildi = 10 + bonus;
    xal += qazanildi;
    umumi += qazanildi;
    localStorage.setItem("nilarXal", umumi);
    document.getElementById("xalTxt").textContent = umumi;
    duzgun++;
    fbGoster("ok", "🎉 Düzgündür! +" + qazanildi + " xal! " + q.i);
    confetti();
  } else {
    document.getElementById("op" + idx).classList.add("wrong");
    setTimeout(function(){ document.getElementById("op" + q.a).classList.add("correct"); }, 300);
    yanlis++;
    fbGoster("bad", "😔 Yanlış! Düzgün: " + q.o[q.a] + ". " + q.i);
  }
  document.getElementById("nxtBtn").className = "nxt show";
}

function deaktiv() {
  document.querySelectorAll(".obtn").forEach(function(b){ b.disabled = true; });
}

function fbGoster(tip, metn) {
  var el = document.getElementById("fbDiv");
  el.className = "fb " + tip + " show";
  el.textContent = metn;
}

function novbeti() {
  cariIdx++;
  if (cariIdx >= suallar.length) { netice(); return; }
  sualGoster();
}

// ══════════════════════════════
// RESULT
// ══════════════════════════════
function netice() {
  goster("resScr");
  var faiz = Math.round(duzgun / suallar.length * 100);
  var em, ba, al;
  if (faiz >= 90) { em = "🏆"; ba = "Möhtəşəm!"; al = daxilEdilmisAd + ", sən bu fənni əla bilirsən!"; }
  else if (faiz >= 70) { em = "🌟"; ba = "Çox yaxşı!"; al = "Az qaldı mükəmmələ!"; }
  else if (faiz >= 50) { em = "👍"; ba = "Yaxşı cəhd!"; al = "Daha çox çalış!"; }
  else { em = "💪"; ba = "Davam et!"; al = "Yenidən cəhd et!"; }
  
  document.getElementById("resEmoji").textContent = em;
  document.getElementById("resTitle").textContent = ba;
  document.getElementById("resSub").textContent = al;
  document.getElementById("resBig").textContent = duzgun + "/" + suallar.length;
  document.getElementById("rsC").textContent = duzgun;
  document.getElementById("rsW").textContent = yanlis;
  document.getElementById("rsX").textContent = "+" + xal;
  
  var certBtn = document.getElementById("certBtn");
  if (faiz >= 90) {
    certBtn.className = "cert-btn show";
    certBtn.textContent = "🏅 Sertifikatı Al — " + daxilEdilmisAd;
  } else {
    certBtn.className = "cert-btn";
  }
  
  if (faiz >= 70) confetti(20);
  
  // WhatsApp bildirisi
  waGonder(faiz);
}

function waGonder(faiz) {
  var num = "994556456327";
  var fc = FCFG[secilmisSinif] && FCFG[secilmisSinif].filter(function(f){ return f.k === secilmisFenn; })[0];
  var sert = faiz >= 90 ? "Sertifikat qazandi!" : "Sertifikat yoxdur";
  var msg = "NilAr Edu - Yeni Istirakci\n\n" +
    "Ad: " + daxilEdilmisAd + "\n" +
    "Sinif: " + secilmisSinif + "-ci sinif\n" +
    "Fenn: " + (fc ? fc.n : "") + "\n" +
    "Netice: " + faiz + "%\n" +
    "Duzgun: " + duzgun + "/10\n" +
    "Xal: " + xal + "\n" +
    sert + "\n" +
    new Date().toLocaleString("az-AZ");
  
  var a = document.createElement("a");
  a.href = "https://wa.me/" + num + "?text=" + encodeURIComponent(msg);
  a.target = "_blank";
  setTimeout(function(){ a.click(); }, 1500);
  
  // LocalStorage-e de saxla
  try {
    var list = JSON.parse(localStorage.getItem("nilar_data") || "[]");
    list.push({ad: daxilEdilmisAd, sinif: secilmisSinif, fenn: fc ? fc.n : "", faiz: faiz, duzgun: duzgun, yanlis: yanlis, xal: xal, tarix: new Date().toLocaleDateString("az-AZ"), saat: new Date().toLocaleTimeString("az-AZ")});
    localStorage.setItem("nilar_data", JSON.stringify(list));
  } catch(e) {}
}

  document.getElementById("certModal").classList.add("open");

function sertCiz() {
  var cvs = document.getElementById("certCvs");
  var W = 700, H = 500;
  cvs.width = W; cvs.height = H;
  cvs.style.width = "100%";
  var ctx = cvs.getContext("2d");
  
  var faiz = Math.round(duzgun / suallar.length * 100);
  var fc = FCFG[secilmisSinif] && FCFG[secilmisSinif].filter(function(f){ return f.k === secilmisFenn; })[0];
  var today = new Date();
  var aylar = ["Yanvar","Fevral","Mart","Aprel","May","İyun","İyul","Avqust","Sentyabr","Oktyabr","Noyabr","Dekabr"];
  var tarix = today.getDate() + " " + aylar[today.getMonth()] + " " + today.getFullYear();
  
  // Fon
  var bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#fdf6e3"); bg.addColorStop(0.5,"#fff8ec"); bg.addColorStop(1,"#fdf0d5");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  
  // Üst panel
  var up = ctx.createLinearGradient(0,0,W,0);
  up.addColorStop(0,"#1a3a6e"); up.addColorStop(0.5,"#0f2a5e"); up.addColorStop(1,"#1a3a6e");
  ctx.fillStyle = up;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W,0); ctx.lineTo(W,85);
  ctx.bezierCurveTo(W*0.75,105,W*0.25,65,0,85); ctx.closePath(); ctx.fill();
  
  // Alt panel
  var dp = ctx.createLinearGradient(0,H-70,0,H);
  dp.addColorStop(0,"#1a3a6e"); dp.addColorStop(1,"#0f2a5e");
  ctx.fillStyle = dp;
  ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(W,H); ctx.lineTo(W,H-60);
  ctx.bezierCurveTo(W*0.75,H-80,W*0.25,H-40,0,H-60); ctx.closePath(); ctx.fill();
  
  // Cercive
  ctx.strokeStyle = "#c9993a"; ctx.lineWidth = 4;
  ctx.strokeRect(10,10,W-20,H-20);
  ctx.strokeStyle = "rgba(201,153,58,0.4)"; ctx.lineWidth = 1.5;
  ctx.strokeRect(18,18,W-36,H-36);
  
  // Ulduzlar
  function ulduz(x,y,r) {
    ctx.save(); ctx.translate(x,y); ctx.fillStyle = "#f0c060";
    ctx.beginPath();
    for(var i=0;i<10;i++){
      var a = (i * Math.PI/5) - Math.PI/2;
      var rr = i%2===0 ? r : r*0.42;
      if(i===0) ctx.moveTo(Math.cos(a)*rr, Math.sin(a)*rr);
      else ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  ulduz(80,55,12); ulduz(W-80,55,12); ulduz(160,38,8); ulduz(W-160,38,8);
  
  // Ust metn
  ctx.textAlign = "center"; ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.font = "bold 12px Arial"; ctx.fillText("NilAr Edu Center", W/2, 36);
  ctx.font = "bold 18px Arial";
  var ng = ctx.createLinearGradient(W/2-80,0,W/2+80,0);
  ng.addColorStop(0,"#f0c060"); ng.addColorStop(0.5,"#fff8e0"); ng.addColorStop(1,"#f0c060");
  ctx.fillStyle = ng; ctx.fillText("Bilik Yarışması", W/2, 65);
  
  // Bas baslic
  ctx.font = "bold 48px Georgia";
  var tg = ctx.createLinearGradient(W/2-160,0,W/2+160,0);
  tg.addColorStop(0,"#c9993a"); tg.addColorStop(0.4,"#f0c060");
  tg.addColorStop(0.6,"#fff8e0"); tg.addColorStop(1,"#c9993a");
  ctx.fillStyle = tg;
  ctx.shadowColor = "rgba(201,153,58,0.3)"; ctx.shadowBlur = 10;
  ctx.fillText("SERTIFIKAT", W/2, 162);
  ctx.shadowBlur = 0;
  
  // Xett
  var lg = ctx.createLinearGradient(80,0,W-80,0);
  lg.addColorStop(0,"transparent"); lg.addColorStop(0.5,"#f0c060"); lg.addColorStop(1,"transparent");
  ctx.strokeStyle = lg; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(80,175); ctx.lineTo(W-80,175); ctx.stroke();
  ctx.font = "12px Arial"; ctx.fillStyle = "#c9993a";
  ctx.fillText("✦  ✦  ✦", W/2, 195);
  
  // Alt metn
  ctx.font = "14px Arial"; ctx.fillStyle = "#7a6020";
  ctx.fillText("Bu sertifikat aşağıdakı şəxsə verilir", W/2, 222);
  
  // Ad
  var nmW = Math.max(ctx.measureText(daxilEdilmisAd).width + 100, 260);
  ctx.fillStyle = "rgba(201,153,58,0.1)";
  ctx.beginPath(); ctx.roundRect(W/2-nmW/2, 232, nmW, 48, 24); ctx.fill();
  ctx.strokeStyle = "rgba(201,153,58,0.5)"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(W/2-nmW/2, 232, nmW, 48, 24); ctx.stroke();
  
  ctx.font = "bold 30px Georgia"; ctx.fillStyle = "#2a1500";
  ctx.fillText(daxilEdilmisAd, W/2, 263);
  
  // Fennn/sinif
  ctx.font = "13px Arial"; ctx.fillStyle = "#8a6820";
  ctx.fillText(secilmisSinif + "-ci sinif  ✦  " + (fc ? fc.n : "") + "  ✦  Bilik Yarışması", W/2, 300);
  
  // 3 panel
  var panels = [{l:"Düzgün",v: duzgun+"/"+suallar.length,c:"#1a7a40",bg:"rgba(46,204,113,0.1)"},
                {l:"Nəticə",v:faiz+"%",c:"#c9993a",bg:"rgba(201,153,58,0.15)"},
                {l:"Xal",v:"+"+xal,c:"#1a3a6e",bg:"rgba(26,58,110,0.1)"}];
  panels.forEach(function(p,i){
    var px = W/2 - 240 + i*195, py = 318, pw = 160, ph = 65;
    ctx.fillStyle = p.bg;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,10); ctx.fill();
    ctx.strokeStyle = "rgba(201,153,58,0.3)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,10); ctx.stroke();
    ctx.font = "bold 24px Georgia"; ctx.fillStyle = p.c;
    ctx.fillText(p.v, px+pw/2, py+35);
    ctx.font = "11px Arial"; ctx.fillStyle = "#9a7830";
    ctx.fillText(p.l, px+pw/2, py+54);
  });
  
  // Xett
  ctx.strokeStyle = lg; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60,400); ctx.lineTo(W-60,400); ctx.stroke();
  
  // Mehur
  ctx.beginPath(); ctx.arc(W/2,435,26,0,Math.PI*2);
  ctx.strokeStyle = "#c9993a"; ctx.lineWidth = 2; ctx.stroke();
  for(var a=0;a<Math.PI*2;a+=Math.PI/8){
    ctx.beginPath();
    ctx.moveTo(W/2+Math.cos(a)*30,435+Math.sin(a)*30);
    ctx.lineTo(W/2+Math.cos(a)*34,435+Math.sin(a)*34);
    ctx.strokeStyle="#c9993a"; ctx.lineWidth=1.5; ctx.stroke();
  }
  ctx.font = "18px serif"; ctx.fillStyle = "#c9993a";
  ctx.fillText("✦", W/2, 442);
  
  ulduz(W/2-70,435,9); ulduz(W/2+70,435,9);
  ulduz(W/2-120,435,6); ulduz(W/2+120,435,6);
  
  // Alt
  ctx.font = "10px Arial"; ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.textAlign = "left"; ctx.fillText("📅 " + tarix, 44, H-24);
  ctx.textAlign = "right"; ctx.fillText("nilar.edu.az", W-44, H-24);
}

  window.scrollTo(0,0);

function confetti(n) {
  n = n || 12;
  var renkler = ["#c9993a","#f0c060","#2ecc71","#339af0","#cc5de8","#ff6b6b"];
  for(var i=0;i<n;i++){
    (function(){
      var el = document.createElement("div");
      el.className = "cnf";
      var sz = 6 + Math.random()*9;
      el.style.cssText = "left:"+Math.random()*100+"vw;top:"+Math.random()*20+"vh;background:"+renkler[Math.floor(Math.random()*renkler.length)]+";width:"+sz+"px;height:"+sz+"px;border-radius:"+(Math.random()>.5?"50%":"3px")+";animation-duration:"+(2+Math.random()*2)+"s;animation-delay:"+(Math.random()*.5)+"s;";
      document.body.appendChild(el);
      setTimeout(function(){ el.parentNode && el.parentNode.removeChild(el); },5000);
    })();
  }
}

// Admin
function openAdmin(){
  var p = prompt("Admin şifrəsi:");
  if(p === "nilar2025"){
    var list = JSON.parse(localStorage.getItem("nilar_data")||"[]");
    if(!list.length){ alert("Hələ heç bir iştirakçı yoxdur."); return; }
    var msg = "CƏMİ: " + list.length + " iştirakçı\n\n";
    list.slice(-20).reverse().forEach(function(item,i){
      msg += (i+1)+". "+item.ad+" | "+item.sinif+"-ci sinif | "+item.fenn+" | "+item.faiz+"% | "+item.xal+" xal | "+item.tarix+"\n";
    });
    alert(msg);
  } else if(p !== null){ alert("Şifrə yanlışdır!"); }
}

window.addEventListener("load", function(){
  var aBtn = document.querySelector(".admin-btn");
  if(aBtn) aBtn.addEventListener("click", function(e){ e.preventDefault(); openAdmin(); });
});
